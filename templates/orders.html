<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="icon" href="{% static 'images/favicon4.png' %}" type="images/favicon3.png">
    <title>Заказы</title>
</head>

<body>
<header>
        {% include 'header.html' %}
    </header>

    <div class="container-2">
        <div class="form-orders">
            <form method="post" id="MyForm" enctype="multipart/form-data">
                {% csrf_token %}
                <label>
                    <h2>Выберите услугу</h2>
                </label>
                <div class="form-group">
                    <select name="name">
                        {% for o in object %}
                        <option value="{{ o.pk }}">{{ o.name }}</option>
                        {%endfor%}
                    </select>
                </div>
                <div class="form-group">
                    <input type="text" placeholder="Введите ваше имя и фамилию" name="fio">
                </div>
                <div class="form-group">
                    <input type="text" placeholder="Введите номер телефона" name="number">
                </div>
                <div class="form-group">
                    <input type="text" placeholder="Опишите задачу" name="description">
                </div>
                <div class="form-group">
                    <input type="file" name="file"
                        style="padding: 10px; width: 100%; border: 1px solid #A9A9A9; border-radius: 5px;">
                </div>
                <div class="form-group">
                    <input type="submit" value="Сделать заказ" class="button">
                </div>
            </form>
        </div>
    </div>
    <div id="window" class="window">
        <div class="window-content">
            <p>Спасибо! Форма успешно отправлена.</p>
            <button id="closeWindow">Закрыть</button>
        </div>
    </div>
{% include 'footer.html' %}
<script src="{% static 'js/script.js' %}"></script>
</body>

</html>
