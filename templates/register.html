<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Регистрация</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/authreg.css' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
<header>
{% include 'header.html' %}
</header>
<div class="registration">
    <form method="post">
        <h2 class="text-center">Регистрация</h2>
        <div class="form-group">
            <input type="text" name="username" placeholder="Логин">
        </div>
        <div class="form-group">
            <input type="password" name="password" placeholder="Пароль">
        </div>
        <div class="form-group">
            <input type="password" name="password_confirm" placeholder="Повторите пароль">
        </div>
        <div class="form-group">
            <input type="email" name="email" placeholder="email">
        </div>
        <div class="form-group">
            <input type="submit" value="Зарегестрироваться" class="button">
        </div>
        <div class="form-group">
            <P style="color: #696969">Зарегестрированы?</P><a href="{% url 'login' %}"> Авторизоваться</a>
        </div>
    </form>
</div>
</body>
</html>
